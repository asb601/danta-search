name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            # ── 1. Install uv if not present (fresh VM bootstrap) ─────────────
            if ! command -v uv &>/dev/null; then
              echo "uv not found — installing..."
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
              echo "uv installed: $(uv --version)"
            else
              echo "uv OK: $(uv --version)"
            fi

            # ── 2. Clone repo if not present (fresh VM bootstrap) ────────────
            if [ ! -d "$HOME/G-CHAT-/.git" ]; then
              echo "Repo not found — cloning..."
              git clone https://github.com/asb601/G-CHAT-.git "$HOME/G-CHAT-"
            fi


            cd ~/G-CHAT-

            # Keep the VM checkout clean and pinned to the branch that triggered deploy.
            # Older deploys removed client/ from a tracked repo, leaving the VM dirty.
            git restore client server/uv.lock 2>/dev/null || true
            git fetch origin main
            git checkout -B main origin/main

            # ── 3. Write .env from GitHub Secret ─────────────────────────────
            cat > ~/G-CHAT-/server/.env << 'ENVEOF'
            ${{ secrets.SERVER_ENV }}
            ENVEOF

            # ── 4. Sync dependencies ──────────────────────────────────────────
            cd ~/G-CHAT-/server
            uv sync --frozen

            # ── 4.1. Ensure local Redis is available for Celery ───────────────
            # Only manage Redis when the app is configured to use localhost.
            # External Redis setups are controlled outside this deploy script.
            if grep -q '^REDIS_URL=redis://localhost' ~/G-CHAT-/server/.env; then
              if ! command -v redis-server &>/dev/null; then
                echo "redis-server not found — installing..."
                sudo apt-get update
                sudo apt-get install -y redis-server
              fi
              sudo systemctl enable --now redis-server
              if systemctl is-active --quiet redis-server; then
                echo "redis-server OK"
              else
                echo "redis-server failed to start — logs:"
                sudo journalctl -u redis-server -n 30 --no-pager
                exit 1
              fi
            fi

            # ── 5. Create gchat FastAPI service if not present ────────────────
            if [ ! -f /etc/systemd/system/gchat.service ]; then
              echo "gchat.service not found — creating..."
              sudo tee /etc/systemd/system/gchat.service > /dev/null << SVCEOF
            [Unit]
            Description=G-CHAT FastAPI Backend
            After=network.target

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=$HOME/G-CHAT-/server
            EnvironmentFile=$HOME/G-CHAT-/server/.env
            ExecStart=$HOME/.local/bin/uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            SVCEOF
              sudo systemctl daemon-reload
              sudo systemctl enable gchat
              echo "gchat.service created and enabled"
            fi

            # ── 6. Create gchat-celery worker service if not present ──────────
            if [ ! -f /etc/systemd/system/gchat-celery.service ]; then
              echo "gchat-celery.service not found — creating..."
              sudo tee /etc/systemd/system/gchat-celery.service > /dev/null << CELEOF
            [Unit]
            Description=G-CHAT Celery Ingest Worker
            After=network.target gchat.service

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=$HOME/G-CHAT-/server
            EnvironmentFile=$HOME/G-CHAT-/server/.env
            ExecStart=$HOME/.local/bin/uv run celery -A app.worker.celery_app worker -Q ingest_normal -c 1 -n ingest_normal@%%h --loglevel=info
            Restart=always
            RestartSec=10
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            CELEOF
              sudo systemctl daemon-reload
              sudo systemctl enable gchat-celery
              echo "gchat-celery.service created and enabled"
            fi

            # ── 7. Restart both services ──────────────────────────────────────
            if sudo systemctl restart gchat; then
              echo "gchat started OK"
            else
              echo "gchat failed to start — logs:"
              sudo journalctl -u gchat -n 40 --no-pager
            fi

            if sudo systemctl restart gchat-celery; then
              echo "gchat-celery started OK"
            else
              echo "gchat-celery failed to start — logs:"
              sudo journalctl -u gchat-celery -n 20 --no-pager
            fi

            # ── 8. Wait for uvicorn to be healthy ─────────────────────────────
            HEALTHY=0
            for i in $(seq 1 15); do
              sleep 4
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health 2>/dev/null || echo "000")
              echo "Attempt $i: status=$STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Backend OK"
                HEALTHY=1
                break
              fi
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "Backend did not become healthy — full gchat logs:"
              sudo journalctl -u gchat -n 60 --no-pager
              exit 1
            fi

            # ── 9. DB migrations (safe no-op if already applied) ──────────────
            cd ~/G-CHAT-/server
            uv run python -m app.migrations.chat_memory_upgrade
            echo "Migrations complete"

            # ── 10. Verify Celery worker is running ───────────────────────────
            if systemctl is-active --quiet gchat-celery; then
              echo "Celery worker OK"
            else
              echo "WARNING: gchat-celery is not running — check logs:"
              sudo journalctl -u gchat-celery -n 20 --no-pager
            fi
