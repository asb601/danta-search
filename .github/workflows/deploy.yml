name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            export PATH="$HOME/.local/bin:$PATH"

            cd ~/G-CHAT-

            # Discard any locally modified lock file so git pull never aborts
            git checkout server/uv.lock 2>/dev/null || true

            # Pull latest code
            git pull origin main

            # Remove client folder — VM only needs server
            rm -rf ~/G-CHAT-/client

            # Write .env from GitHub Secret
            cat > ~/G-CHAT-/server/.env << 'ENVEOF'
            ${{ secrets.SERVER_ENV }}
            ENVEOF

            # Sync dependencies so any new packages in uv.lock are installed
            cd ~/G-CHAT-/server
            uv sync --frozen

            # Restart backend service (creates all tables on first start)
            sudo systemctl restart gchat

            # Wait for uvicorn to fully start, then verify
            HEALTHY=0
            for i in $(seq 1 10); do
              sleep 3
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health)
              echo "Attempt $i: status=$STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Backend OK"
                HEALTHY=1
                break
              fi
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "Backend did not become healthy"
              sudo journalctl -u gchat -n 30 --no-pager
              exit 1
            fi

            # Run DB migrations after service is up (safe no-op if columns already exist)
            cd ~/G-CHAT-/server
            uv run python -m app.migrations.chat_memory_upgrade
            echo "Migrations complete"
