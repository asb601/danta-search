name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            # ‚îÄ‚îÄ 1. Install uv if not present (fresh VM bootstrap) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if ! command -v uv &>/dev/null; then
              echo "uv not found ‚Äî installing..."
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
              echo "uv installed: $(uv --version)"
            else
              echo "uv OK: $(uv --version)"
            fi

            # ‚îÄ‚îÄ 2. Clone repo if not present (fresh VM bootstrap) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if [ ! -d "$HOME/G-CHAT-/.git" ]; then
              echo "Repo not found ‚Äî cloning..."
              git clone https://github.com/asb601/G-CHAT-.git "$HOME/G-CHAT-"
            fi


            cd ~/G-CHAT-

            # Keep the VM checkout clean and pinned to the branch that triggered deploy.
            # Older deploys removed client/ from a tracked repo, leaving the VM dirty.
            git restore client server/uv.lock 2>/dev/null || true
            git fetch origin main
            git checkout -B main origin/main

            # ‚îÄ‚îÄ 3. Write .env from GitHub Secret ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            cat > ~/G-CHAT-/server/.env << 'ENVEOF'
            ${{ secrets.SERVER_ENV }}
            ENVEOF

            # ‚îÄ‚îÄ 4. Sync dependencies ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            cd ~/G-CHAT-/server
            uv sync --frozen

            # ‚îÄ‚îÄ 5. Create gchat FastAPI service if not present ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if [ ! -f /etc/systemd/system/gchat.service ]; then
              echo "gchat.service not found ‚Äî creating..."
              sudo tee /etc/systemd/system/gchat.service > /dev/null << SVCEOF
            [Unit]
            Description=G-CHAT FastAPI Backend
            After=network.target

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=$HOME/G-CHAT-/server
            EnvironmentFile=$HOME/G-CHAT-/server/.env
            ExecStart=$HOME/.local/bin/uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            SVCEOF
              sudo systemctl daemon-reload
              sudo systemctl enable gchat
              echo "gchat.service created and enabled"
            fi

            # ‚îÄ‚îÄ 6. Create gchat-celery worker service if not present ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if [ ! -f /etc/systemd/system/gchat-celery.service ]; then
              echo "gchat-celery.service not found ‚Äî creating..."
              sudo tee /etc/systemd/system/gchat-celery.service > /dev/null << CELEOF
            [Unit]
            Description=G-CHAT Celery Ingest Worker
            After=network.target gchat.service

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=$HOME/G-CHAT-/server
            EnvironmentFile=$HOME/G-CHAT-/server/.env
            ExecStart=$HOME/.local/bin/uv run celery -A app.worker.celery_app worker -Q ingest_normal -c 1 -n ingest_normal@%%h --loglevel=info
            Restart=always
            RestartSec=10
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            CELEOF
              sudo systemctl daemon-reload
              sudo systemctl enable gchat-celery
              echo "gchat-celery.service created and enabled"
            fi

            # ‚îÄ‚îÄ 7. Restart both services ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if sudo systemctl restart gchat; then
              echo "gchat started OK"
            else
              echo "gchat failed to start ‚Äî logs:"
              sudo journalctl -u gchat -n 40 --no-pager
            fi

            if sudo systemctl restart gchat-celery; then
              echo "gchat-celery started OK"
            else
              echo "gchat-celery failed to start ‚Äî logs:"
              sudo journalctl -u gchat-celery -n 20 --no-pager
            fi

            # ‚îÄ‚îÄ 8. Wait for uvicorn to be healthy ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            HEALTHY=0
            for i in $(seq 1 15); do
              sleep 4
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health 2>/dev/null || echo "000")
              echo "Attempt $i: status=$STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Backend OK"
                HEALTHY=1
                break
              fi
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "Backend did not become healthy ‚Äî full gchat logs:"
              sudo journalctl -u gchat -n 60 --no-pager
              exit 1
            fi

            # ‚îÄ‚îÄ 9. DB migrations (safe no-op if already applied) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            cd ~/G-CHAT-/server
            uv run python -m app.migrations.chat_memory_upgrade
            echo "Migrations complete"

            # ‚îÄ‚îÄ 10. Verify Celery worker is running ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
            if systemctl is-active --quiet gchat-celery; then
              echo "Celery worker OK"
            else
              echo "WARNING: gchat-celery is not running ‚Äî check logs:"
              sudo journalctl -u gchat-celery -n 20 --no-pager
            fi
