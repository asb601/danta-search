
name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ github.token }}

        with:
          host: ${{ secrets.VM_HOST_2 }}
          username: ${{ secrets.VM_USER_2 }}
          key: ${{ secrets.VM_SSH_KEY_2 }}
          envs: GH_TOKEN

          script: |
            set -e
            export PATH="$HOME/.local/bin:$PATH"

            # в”Ђв”Ђ 0. Authenticate git with GitHub token (private repo) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

            # в”Ђв”Ђ 1. Install uv if not present (fresh VM bootstrap) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if ! command -v uv &>/dev/null; then
              echo "uv not found вЂ” installing..."
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"
              echo "uv installed: $(uv --version)"
            else
              echo "uv OK: $(uv --version)"
            fi

            # в”Ђв”Ђ 2. Clone repo if not present (fresh VM bootstrap) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if [ ! -d "$HOME/G-CHAT-/.git" ]; then
              echo "Repo not found вЂ” cloning..."
              git clone https://github.com/asb601/G-CHAT-.git "$HOME/G-CHAT-"
            fi

            cd ~/G-CHAT-

            # Keep VM checkout clean and pinned to main
            git restore client server/uv.lock 2>/dev/null || true
            git fetch origin main
            git checkout -B main origin/main

            # в”Ђв”Ђ 3. Write .env from GitHub Secret в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            cat > ~/G-CHAT-/server/.env << 'ENVEOF'
            ${{ secrets.SERVER_ENV }}
            ENVEOF

            # в”Ђв”Ђ 4. Sync dependencies в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            cd ~/G-CHAT-/server
            uv sync --frozen

            # в”Ђв”Ђ 4.1. Ensure local Redis is available for Celery в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if grep -q '^REDIS_URL=redis://localhost' ~/G-CHAT-/server/.env; then
              REDIS_SERVICE=""

              if systemctl list-unit-files redis-server.service --no-legend 2>/dev/null | grep -q '^redis-server.service'; then
                REDIS_SERVICE="redis-server"
              elif systemctl list-unit-files redis.service --no-legend 2>/dev/null | grep -q '^redis.service'; then
                REDIS_SERVICE="redis"
              fi

              if [ -z "$REDIS_SERVICE" ]; then
                echo "Redis systemd service not found вЂ” installing redis-server..."
                sudo apt-get update
                sudo apt-get install -y redis-server
                sudo systemctl daemon-reload

                if systemctl list-unit-files redis-server.service --no-legend 2>/dev/null | grep -q '^redis-server.service'; then
                  REDIS_SERVICE="redis-server"
                elif systemctl list-unit-files redis.service --no-legend 2>/dev/null | grep -q '^redis.service'; then
                  REDIS_SERVICE="redis"
                fi
              fi

              if [ -z "$REDIS_SERVICE" ]; then
                echo "Redis install completed but no redis systemd service was found"
                systemctl list-unit-files 'redis*.service' --no-legend || true
                exit 1
              fi

              sudo systemctl enable --now "$REDIS_SERVICE"

              if systemctl is-active --quiet "$REDIS_SERVICE"; then
                echo "$REDIS_SERVICE OK"
              else
                echo "$REDIS_SERVICE failed to start вЂ” logs:"
                sudo journalctl -u "$REDIS_SERVICE" -n 30 --no-pager
                exit 1
              fi
            fi

            # в”Ђв”Ђ 5. Create/update FastAPI service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            sudo tee /etc/systemd/system/gchat.service > /dev/null << SVCEOF
            [Unit]
            Description=gchat FastAPI Backend
            After=network.target

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=$HOME/G-CHAT-/server
            EnvironmentFile=$HOME/G-CHAT-/server/.env
            ExecStart=$HOME/.local/bin/uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            sudo systemctl daemon-reload
            sudo systemctl enable gchat

            echo "gchat.service installed/updated"

            # в”Ђв”Ђ 6. Create/update Celery worker service в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            sudo tee /etc/systemd/system/gchat-celery.service > /dev/null << CELEOF
            [Unit]
            Description=gchat Celery Ingest Worker
            After=network.target redis-server.service redis.service gchat.service

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=$HOME/G-CHAT-/server
            EnvironmentFile=$HOME/G-CHAT-/server/.env
            ExecStartPre=$HOME/.local/bin/uv run python -c "from app.worker.celery_app import celery_app; assert 'gchat.ingest_pipeline' in celery_app.tasks, sorted(k for k in celery_app.tasks if k.startswith('gchat.'))"
            ExecStart=$HOME/.local/bin/uv run celery -A app.worker.ingest_tasks:celery_app worker -Q ingest_normal -c 1 -n ingest_normal@%%h --loglevel=info
            TimeoutStopSec=3600
            Restart=always
            RestartSec=10
            StandardOutput=journal
            StandardError=journal

            [Install]
            WantedBy=multi-user.target
            CELEOF

            sudo systemctl daemon-reload
            sudo systemctl enable gchat-celery

            echo "gchat-celery.service installed/updated"

            # в”Ђв”Ђ 7. Restart services в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if sudo systemctl restart gchat; then
              echo "gchat started OK"
            else
              echo "gchat failed to start вЂ” logs:"
              sudo journalctl -u gchat -n 40 --no-pager
              exit 1
            fi

            if sudo systemctl restart gchat-celery; then
              echo "gchat-celery started OK"
            else
              echo "gchat-celery failed to start вЂ” logs:"
              sudo journalctl -u gchat-celery -n 20 --no-pager
              exit 1
            fi

            # в”Ђв”Ђ 8. Health check в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            HEALTHY=0

            for i in $(seq 1 15); do
              sleep 4

              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health 2>/dev/null || echo "000")

              echo "Attempt $i: status=$STATUS"

              if [ "$STATUS" = "200" ]; then
                echo "Backend OK"
                HEALTHY=1
                break
              fi
            done

            if [ "$HEALTHY" = "0" ]; then
              echo "Backend did not become healthy вЂ” full gchat logs:"
              sudo journalctl -u gchat -n 60 --no-pager
              exit 1
            fi

            # в”Ђв”Ђ 9. DB migrations в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            cd ~/G-CHAT-/server
            uv run python -m app.migrations.chat_memory_upgrade

            echo "Migrations complete"

            # в”Ђв”Ђ 10. Verify Celery worker в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            if systemctl is-active --quiet gchat-celery; then
              echo "Celery worker OK"
            else
              echo "WARNING: gchat-celery is not running вЂ” check logs:"
              sudo journalctl -u gchat-celery -n 20 --no-pager
              exit 1
            fi

            CELERY_PING=$(timeout 20s uv run celery -A app.worker.ingest_tasks:celery_app inspect ping 2>&1 || true)

            echo "$CELERY_PING"

            if echo "$CELERY_PING" | grep -q "pong"; then
              echo "Celery broker/worker ping OK"
            else
              echo "Celery inspect ping failed вЂ” gchat-celery may be active but disconnected"
              sudo journalctl -u gchat-celery -n 60 --no-pager
              exit 1
            fi
